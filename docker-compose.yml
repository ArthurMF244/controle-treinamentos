services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: controle_treinamentos_php
    ports:
      - "127.0.0.1:${APP_PORT:-8082}:80"
    volumes:
      - ./:/var/www/html
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-controle_treinamentos}
      DB_USERNAME: ${DB_USERNAME:-controle_treinamentos}
      DB_PASSWORD: ${DB_PASSWORD:-controle_treinamentos}
      RUN_MIGRATIONS: "true"
      TZ: America/Sao_Paulo
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: controle_treinamentos_mysql
    ports:
      - "127.0.0.1:${MYSQL_PORT:-3309}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_DATABASE:-controle_treinamentos}
      MYSQL_USER: ${DB_USERNAME:-controle_treinamentos}
      MYSQL_PASSWORD: ${DB_PASSWORD:-controle_treinamentos}
      TZ: America/Sao_Paulo
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

volumes:
  mysql_data: